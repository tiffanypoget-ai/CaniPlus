<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1F1F20" />
  <meta name="description" content="Espace membre CaniPlus — Planning, ressources et messagerie pour les membres du club canin de Ballaigues." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://app.caniplus.ch/" />
  <meta property="og:title" content="CaniPlus — Éducation canine bienveillante" />
  <meta property="og:description" content="Cours privés, collectifs et théoriques à Ballaigues. Spécialiste comportement & rééducation canine, Canton de Vaud." />
  <meta property="og:image" content="https://app.caniplus.ch/icons/icon-512.png" />
  <meta property="og:url" content="https://app.caniplus.ch" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="fr_CH" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CaniPlus" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet" />
  <title>CaniPlus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: #1F1F20; overscroll-behavior: none; }
    #root { max-width: 430px; margin: 0 auto; min-height: 100dvh; background: #fff; position: relative; }
  </style>
</head>
<body>
  <noscript>Vous devez activer JavaScript pour utiliser CaniPlus.</noscript>
  <div id="root"></div>
  <script>
    // Redirection automatique vers le domaine principal app.caniplus.ch
    // Évite les confusions de session entre cani-plus.vercel.app (URL Vercel)
    // et app.caniplus.ch (domaine custom) — chaque domaine a son propre
    // localStorage/cookies donc une session sur l'un n'est pas valide sur l'autre.
    (function () {
      var h = location.hostname;
      if (h === 'cani-plus.vercel.app' || h.endsWith('.vercel.app')) {
        location.replace('https://app.caniplus.ch' + location.pathname + location.search + location.hash);
      }
    })();
  </script>
</body>
</html>
